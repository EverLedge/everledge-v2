<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: var(--neutral-50); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 22px; max-width: 640px; }
  .stack { display: flex; flex-direction: column; gap: 16px; justify-content: flex-end; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select, Checkbox, Switch, Icon } = window.EverLedgeDesignSystem_de3ce8;
  function Demo() {
    return (
      <div className="grid">
        <Input label="Gift value" prefix="£" defaultValue="250,000" />
        <Select label="Relationship">
          <option>Daughter</option><option>Son</option><option>Grandchild</option><option>Spouse</option>
        </Select>
        <Input label="Recipient" defaultValue="Eleanor Whitcombe" hint="Full legal name" />
        <Input label="Search" iconLeft={<Icon name="search" size={17} color="var(--text-muted)" />} placeholder="Find a gift…" />
        <div className="stack">
          <Checkbox label="Made from surplus income" defaultChecked />
          <Checkbox label="Charitable gift" />
        </div>
        <div className="stack">
          <Switch label="Alert me before exemption" defaultChecked />
          <Switch label="Share with executors" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
