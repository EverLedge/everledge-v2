<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); background: var(--neutral-50); }
  .stage { display: flex; gap: 22px; align-items: stretch; height: 380px; }
  .navwrap { height: 380px; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-subtle); }
  .right { flex: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { SidebarNav, Tabs } = window.EverLedgeDesignSystem_de3ce8;
  const items = [
    { id: 'overview', label: 'Overview', icon: 'home' },
    { id: 'estate', label: 'Estate', icon: 'landmark' },
    { id: 'gifts', label: 'Gifts', icon: 'gift', badge: 12 },
    { id: 'executors', label: 'Executors', icon: 'users' },
    { id: 'documents', label: 'Documents', icon: 'folder' },
    { id: 'reports', label: 'Reports', icon: 'file-text' },
    { id: 'settings', label: 'Settings', icon: 'settings' },
  ];
  function Demo() {
    const [view, setView] = React.useState('gifts');
    const [tab, setTab] = React.useState('active');
    return (
      <div className="stage">
        <div className="navwrap">
          <SidebarNav items={items} active={view} onSelect={setView} />
        </div>
        <div className="right">
          <Tabs active={tab} onChange={setTab} tabs={[
            { id: 'all', label: 'All gifts' },
            { id: 'active', label: 'Active PETs' },
            { id: 'exempt', label: 'Exempt' },
          ]} />
          <p style={{ fontFamily: 'var(--font-sans)', color: 'var(--text-muted)', fontSize: 14, marginTop: 16 }}>
            Selected: <strong style={{ color: 'var(--text-strong)' }}>{view}</strong> · tab <strong style={{ color: 'var(--text-strong)' }}>{tab}</strong>
          </p>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
