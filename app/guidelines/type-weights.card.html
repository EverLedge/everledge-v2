<!-- @dsCard group="Type" viewport="700x150" name="Weights & Eyebrow" subtitle="Geist 300–700; uppercase tracked labels" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-strong); }
  .weights { display: flex; gap: 26px; align-items: baseline; margin-bottom: 20px; }
  .w span { display: block; }
  .w .big { font-size: 30px; letter-spacing: -0.01em; }
  .w .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 4px; }
  .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="weights">
    <div class="w"><span class="big" style="font-weight:300">Aa</span><span class="lab">300 Light</span></div>
    <div class="w"><span class="big" style="font-weight:400">Aa</span><span class="lab">400 Regular</span></div>
    <div class="w"><span class="big" style="font-weight:500">Aa</span><span class="lab">500 Medium</span></div>
    <div class="w"><span class="big" style="font-weight:600">Aa</span><span class="lab">600 Semibold</span></div>
    <div class="w"><span class="big" style="font-weight:700">Aa</span><span class="lab">700 Bold</span></div>
  </div>
  <div class="eyebrow">Estate planning · Inheritance tax</div>
</body>
</html>
