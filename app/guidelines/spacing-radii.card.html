<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radii" subtitle="Soft, considered — never playful" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; font-family: var(--font-sans); background: var(--surface-card); }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 76px; height: 56px; background: var(--blue-50); border: 1px solid var(--blue-100); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-strong); margin-top: 9px; font-weight: 600; }
  .px { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lab">xs</div><div class="px">4px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab">sm</div><div class="px">6px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab">md</div><div class="px">10px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab">lg · cards</div><div class="px">14px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lab">xl</div><div class="px">20px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:96px"></div><div class="lab">pill</div><div class="px">999px</div></div>
  </div>
</body>
</html>
