<!-- @dsCard group="Brand" viewport="700x180" name="Logo & Mark" subtitle="EverLedge interlocking mark; light & dark grounds" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-sans); display: flex; }
  .pane { flex: 1; display: flex; align-items: center; justify-content: center; padding: 28px; }
  .light { background: var(--surface-card); border-right: 1px solid var(--border-subtle); }
  .dark { background: var(--navy-800); }
  img { display: block; }
  .lockup { display: flex; align-items: center; gap: 13px; }
  .lockup .word { font-family: var(--font-sans); font-size: 28px; font-weight: 600; letter-spacing: -0.02em; color: var(--navy-800); }
</style>
</head>
<body>
  <div class="pane light"><div class="lockup"><img src="../assets/everledge-mark.png" alt="" width="46" height="46"><span class="word">EverLedge</span></div></div>
  <div class="pane dark"><img src="../assets/everledge-mark-light.png" alt="EverLedge mark" width="60"></div>
</body>
</html>
