<!-- @dsCard group="Brand" viewport="700x150" name="Motion" subtitle="Restrained easing; soft fades and gentle lift" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-strong); }
  .row { display: flex; gap: 16px; }
  .tok { flex: 1; border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 14px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-strong); font-weight: 600; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 4px; }
  .track { height: 6px; background: var(--surface-sunken); border-radius: 999px; margin-top: 14px; overflow: hidden; position: relative; }
  .dot { position: absolute; top: -3px; width: 12px; height: 12px; border-radius: 50%; background: var(--color-primary); animation: glide 2.6s infinite; }
  .e2 .dot { animation-timing-function: cubic-bezier(0.32,0.72,0,1); background: var(--gold-600); }
  .e1 .dot { animation-timing-function: cubic-bezier(0.22,0.61,0.36,1); }
  @keyframes glide { 0% { left: 0 } 50% { left: calc(100% - 12px) } 100% { left: 0 } }
</style>
</head>
<body>
  <div class="row">
    <div class="tok e1"><div class="name">--ease-standard</div><div class="val">cubic-bezier(.22,.61,.36,1) · 220ms</div><div class="track"><span class="dot"></span></div></div>
    <div class="tok e2"><div class="name">--ease-emphasis</div><div class="val">cubic-bezier(.32,.72,0,1) · 420ms</div><div class="track"><span class="dot"></span></div></div>
  </div>
</body>
</html>
