<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); background: var(--surface-card); }
  .row { display: flex; gap: 16px; }
  figure { margin: 0; flex: 1; }
  img { width: 100%; display: block; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  figcaption { font-size: 12px; color: var(--text-muted); margin-top: 9px; text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <figure><img src="../assets/illustration-house.svg" alt="Country house"><figcaption>Country house · legacy</figcaption></figure>
    <figure><img src="../assets/illustration-landmark.svg" alt="Landmark colonnade"><figcaption>Colonnade · institution</figcaption></figure>
    <figure><img src="../assets/illustration-document.svg" alt="Estate document and seal"><figcaption>Deed & seal · records</figcaption></figure>
  </div>
</body>
</html>
