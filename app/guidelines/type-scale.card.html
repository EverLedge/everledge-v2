<!-- @dsCard group="Type" viewport="700x340" name="Type Scale — Geist" subtitle="H1 40 · H2 30 · H3 24 · H4 18 · Body 16 · Small 14" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-strong); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 9px 0; border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: none; }
  .tag { width: 96px; flex: none; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .spec { width: 64px; flex: none; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-align: right; }
  .sample { flex: 1; letter-spacing: var(--tracking-snug); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="row"><span class="tag">H1 / Semibold</span><span class="sample" style="font-size:var(--text-h1);font-weight:600;letter-spacing:var(--tracking-tight)">Protect your estate</span><span class="spec">40px</span></div>
  <div class="row"><span class="tag">H2 / Semibold</span><span class="sample" style="font-size:var(--text-h2);font-weight:600">A digital family office</span><span class="spec">30px</span></div>
  <div class="row"><span class="tag">H3 / Semibold</span><span class="sample" style="font-size:var(--text-h3);font-weight:600">Lifetime gifts recorded</span><span class="spec">24px</span></div>
  <div class="row"><span class="tag">H4 / Medium</span><span class="sample" style="font-size:var(--text-h4);font-weight:500">Seven-year PET period</span><span class="spec">18px</span></div>
  <div class="row"><span class="tag">Body / Regular</span><span class="sample" style="font-size:var(--text-base);font-weight:400;color:var(--text-body)">Your affairs, organised for the people who matter.</span><span class="spec">16px</span></div>
  <div class="row"><span class="tag">Small / Regular</span><span class="sample" style="font-size:var(--text-sm);font-weight:400;color:var(--text-body)">Records maintained for your family and executors.</span><span class="spec">14px</span></div>
</body>
</html>
