<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft, low-spread, cool-grey shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 26px; font-family: var(--font-sans); background: var(--neutral-50); }
  .row { display: flex; gap: 26px; }
  .item { text-align: center; }
  .box { width: 96px; height: 64px; background: var(--surface-card); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-strong); margin-top: 13px; font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lab">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm · resting card</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md · hover</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lab">xl · dialog</div></div>
  </div>
</body>
</html>
