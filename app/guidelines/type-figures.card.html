<!-- @dsCard group="Type" viewport="700x150" name="Figures — Geist Mono" subtitle="Tabular mono for money, dates & ledgers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-strong); }
  .grid { display: flex; gap: 36px; align-items: flex-end; }
  .item .v { font-family: var(--font-mono); font-weight: 500; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .item .l { font-size: 11px; color: var(--text-muted); margin-top: 6px; letter-spacing: var(--tracking-caps); text-transform: uppercase; font-weight: 600; }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="v" style="font-size:40px">£4.28M</div><div class="l">Net estate</div></div>
    <div class="item"><div class="v" style="font-size:40px">£612,000</div><div class="l">IHT exposure</div></div>
    <div class="item"><div class="v" style="font-size:28px;color:var(--gold-700)">14 Sep 2021</div><div class="l">Gift date</div></div>
  </div>
</body>
</html>
