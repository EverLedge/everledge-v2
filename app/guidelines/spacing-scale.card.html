<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base · generous whitespace" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; font-family: var(--font-sans); background: var(--surface-card); }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .item { text-align: center; }
  .bar { background: var(--blue-100); border: 1px solid var(--blue-100); border-radius: var(--radius-xs); }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 7px; }
  .px { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:24px;height:4px"></div><div class="lab">1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="width:24px;height:8px"></div><div class="lab">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="width:24px;height:12px"></div><div class="lab">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="width:24px;height:16px"></div><div class="lab">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="lab">5</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="width:24px;height:32px"></div><div class="lab">6</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="width:24px;height:40px"></div><div class="lab">7</div><div class="px">40</div></div>
    <div class="item"><div class="bar" style="width:24px;height:48px"></div><div class="lab">8</div><div class="px">48</div></div>
    <div class="item"><div class="bar" style="width:24px;height:64px"></div><div class="lab">9</div><div class="px">64</div></div>
    <div class="item"><div class="bar" style="width:24px;height:80px"></div><div class="lab">10</div><div class="px">80</div></div>
  </div>
</body>
</html>
