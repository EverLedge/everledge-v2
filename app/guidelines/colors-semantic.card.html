<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — Status" subtitle="Success, warning, danger with tinted grounds" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); background: var(--surface-card); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); overflow: hidden; }
  .chip { height: 48px; display: flex; align-items: center; padding: 0 14px; }
  .pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; }
  .meta { padding: 8px 12px; }
  .name { font-size: 12px; font-weight: 600; color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background:var(--status-success-bg)"><span class="pill" style="color:#fff;background:var(--status-success)">Exempt</span></div>
      <div class="meta"><div class="name">success</div><div class="hex">#2F7D4A</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--status-warning-bg)"><span class="pill" style="color:#fff;background:var(--status-warning)">Expiring</span></div>
      <div class="meta"><div class="name">warning</div><div class="hex">#A86E1A</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background:var(--status-danger-bg)"><span class="pill" style="color:#fff;background:var(--status-danger)">In estate</span></div>
      <div class="meta"><div class="name">danger</div><div class="hex">#B0413A</div></div>
    </div>
  </div>
</body>
</html>
