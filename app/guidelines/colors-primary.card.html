<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Blue" subtitle="Composed private-bank blue; the single brand colour" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); background: var(--surface-card); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.05); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 600; color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--blue-900)"></div><div class="meta"><div class="name">blue-900</div><div class="hex">#16385A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="meta"><div class="name">blue-700</div><div class="hex">#1F517E</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><div class="name">blue-600 ·  Primary</div><div class="hex">#2D6AA0</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><div class="meta"><div class="name">blue-100</div><div class="hex">#DCE8F2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><div class="meta"><div class="name">blue-50</div><div class="hex">#EEF4F9</div></div></div>
  </div>
</body>
</html>
