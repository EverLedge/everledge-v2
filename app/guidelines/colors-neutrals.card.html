<!-- @dsCard group="Colors" viewport="700x150" name="Navy & Neutrals" subtitle="Ink, headers, paper and hairlines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; font-family: var(--font-sans); background: var(--surface-card); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.05); overflow: hidden; }
  .chip { height: 56px; }
  .meta { padding: 7px 9px; }
  .name { font-size: 11px; font-weight: 600; color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row" style="margin-bottom:10px;">
    <div class="sw"><div class="chip" style="background:var(--navy-900)"></div><div class="meta"><div class="name">navy-900</div><div class="hex">#131D27</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-800)"></div><div class="meta"><div class="name">navy-800</div><div class="hex">#1A2734</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-700)"></div><div class="meta"><div class="name">navy-700</div><div class="hex">#28394A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy-600)"></div><div class="meta"><div class="name">navy-600</div><div class="hex">#3A4D60</div></div></div>
  </div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--neutral-50)"></div><div class="meta"><div class="name">neutral-50</div><div class="hex">#F7F8FA</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-100)"></div><div class="meta"><div class="name">neutral-100</div><div class="hex">#F0F2F5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-200)"></div><div class="meta"><div class="name">neutral-200 · border</div><div class="hex">#E4E7EB</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-400)"></div><div class="meta"><div class="name">neutral-400</div><div class="hex">#AEB6BF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--neutral-600)"></div><div class="meta"><div class="name">neutral-600</div><div class="hex">#5A6573</div></div></div>
  </div>
</body>
</html>
