<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EverLedge — Estate</title>
<link rel="icon" type="image/png" href="/app/uploads/EverLedge Fav.png">
<link rel="stylesheet" href="/app/styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // Auth gate — redirect to login if no session
  const _sb = supabase.createClient(
    'https://vzanekapmmnjspbbydek.supabase.co',
    'sb_publishable_eOFaGkpTlT2x8c6wA_mUyg_mb_9b2Mu'
  );
  _sb.auth.getSession().then(({ data }) => {
    if (!data.session) window.location.replace('/login');
  });
  window._supabase = _sb;
</script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="/app/_ds_bundle.js"></script>
<script src="/app/ui_kits/web-app/data.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-sans); background: var(--surface-app); color: var(--text-body); }
  #root { height: 100vh; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--neutral-300); border-radius: 999px; border: 3px solid var(--surface-app); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="/app/ui_kits/web-app/Topbar.jsx"></script>
<script type="text/babel" src="/app/ui_kits/web-app/OverviewScreen.jsx"></script>
<script type="text/babel" src="/app/ui_kits/web-app/GiftsScreen.jsx"></script>
<script type="text/babel" src="/app/ui_kits/web-app/SecondaryScreens.jsx"></script>
<script type="text/babel" src="/app/ui_kits/web-app/EstateScreen.jsx"></script>
<script type="text/babel" src="/app/ui_kits/web-app/ReportsScreen.jsx"></script>
<script type="text/babel" src="/app/ui_kits/web-app/SettingsScreen.jsx"></script>
<script type="text/babel" data-presets="react">
  const { SidebarNav, Avatar, Icon, Button } = window.EverLedgeDesignSystem_de3ce8;

  const NAV = [
    { id: 'overview',   label: 'Overview',   icon: 'home' },
    { id: 'estate',     label: 'Estate',     icon: 'landmark' },
    { id: 'gifts',      label: 'Gifts',      icon: 'gift' },
    { id: 'executors',  label: 'Executors',  icon: 'users' },
    { id: 'documents',  label: 'Documents',  icon: 'folder' },
    { id: 'reports',    label: 'Reports',    icon: 'file-text' },
    { id: 'settings',   label: 'Settings',   icon: 'settings' },
  ];

  const META = {
    overview:  { title: 'Overview',       subtitle: 'Your estate at a glance — organised and protected.' },
    estate:    { title: 'Estate',         subtitle: 'Assets, liabilities and current valuation.' },
    gifts:     { title: 'Lifetime Gifts', subtitle: 'Potentially Exempt Transfers and their seven-year status.' },
    executors: { title: 'Executors',      subtitle: 'Those entrusted to administer your estate.' },
    documents: { title: 'Documents',      subtitle: 'Wills, deeds and valuations, securely stored.' },
    reports:   { title: 'Reports',        subtitle: 'Inheritance tax projections and summaries.' },
    settings:  { title: 'Settings',       subtitle: 'Account and security settings.' },
  };

  function App() {
    const [view, setView] = React.useState('overview');
    const [search, setSearch] = React.useState('');
    const [authUser, setAuthUser] = React.useState(null);
    const [plan, setPlan] = React.useState('free');

    React.useEffect(() => {
      window._supabase.auth.getSession().then(async ({ data }) => {
        if (!data.session) return;
        setAuthUser(data.session.user);
        const { data: profile } = await window._supabase
          .from('profiles')
          .select('plan')
          .eq('id', data.session.user.id)
          .single();
        if (profile) setPlan(profile.plan);
      });
    }, []);

    const displayName = authUser
      ? (authUser.user_metadata?.full_name || authUser.email)
      : 'EverLedge User';

    async function handleSignOut() {
      await window._supabase.auth.signOut();
      window.location.replace('/login');
    }

    function handleNav(id) {
      setView(id);
      setSearch('');
    }

    const footer = (
      <div onClick={() => handleNav('settings')} title="Settings" style={{ display: 'flex', alignItems: 'center', gap: 11, cursor: 'pointer' }}>
        <Avatar name={displayName} tone="navy" size={36} />
        <div style={{ flex: 1, minWidth: 0, lineHeight: 1.25 }}>
          <div style={{ fontSize: 'var(--text-sm)', fontWeight: 600, color: 'var(--text-strong)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{displayName}</div>
          <div style={{ fontSize: 'var(--text-xs)', color: 'var(--text-muted)' }}>Settings</div>
        </div>
        <Icon name="settings" size={16} color="var(--neutral-400)" />
      </div>
    );

    let screen;
    if      (view === 'overview')  screen = <window.OverviewScreen  search={search} onNavigate={handleNav} plan={plan} />;
    else if (view === 'estate')    screen = <window.EstateScreen    search={search} />;
    else if (view === 'gifts')     screen = <window.GiftsScreen     search={search} />;
    else if (view === 'executors') screen = <window.ExecutorsScreen search={search} />;
    else if (view === 'documents') screen = <window.DocumentsScreen search={search} plan={plan} onUpgrade={() => handleNav('settings')} />;
    else if (view === 'reports')   screen = <window.ReportsScreen   plan={plan} onUpgrade={() => handleNav('settings')} />;
    else if (view === 'settings')  screen = <window.SettingsScreen  plan={plan} />;

    return (
      <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
        <SidebarNav items={NAV} active={view} onSelect={handleNav} footer={footer} />
        <main style={{ flex: 1, overflowY: 'auto', background: 'var(--surface-app)' }}>
          <window.Topbar
            title={META[view].title}
            subtitle={META[view].subtitle}
            search={search}
            onSearch={setSearch}
          />
          {screen}
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
